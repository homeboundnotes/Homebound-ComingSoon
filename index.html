<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/brand/logo-mark-dark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Homebound — handmade books, bound with love. Coming soon." />
    <title>homebound — coming soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mozilla+Text:wght@400;500;600;700&family=Shadows+Into+Light&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="stage" aria-label="Handbound notebooks">
        <canvas id="scene"></canvas>
      </section>

      <header class="topbar">
        <div class="lockup">
          <img class="lockup-logo" src="/brand/full-logo-light.svg" alt="homebound" />
          <p class="lockup-note">Handmade notebooks from Kerala.</p>
        </div>
      </header>

      <div class="bottom">
        <h1 class="giant" aria-label="Coming soon">
          <span class="giant-line giant-line-coming">Coming</span>
          <span class="giant-line giant-line-soon">Soon</span>
        </h1>
        <a
          class="instagram-follow"
          href="https://www.instagram.com/homeboundnotes/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Follow Homebound on Instagram"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="5" />
            <circle cx="12" cy="12" r="4.25" />
            <circle class="instagram-dot" cx="17.35" cy="6.75" r="1" />
          </svg>
          <span class="instagram-copy-desktop">Follow on Instagram</span>
          <span class="instagram-copy-mobile">Follow on Instagram</span>
        </a>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
